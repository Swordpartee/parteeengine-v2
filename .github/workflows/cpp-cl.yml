name: C++ CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Run C++ Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cmake ninja-build g++ ccache

      - name: Configure build for compile commands
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Check C++ formatting
        run: |
          find include src test -type f \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) -print0 \
            | xargs -0 clang-format -style=file -n -Werror

      - name: Run clang-tidy
        run: |
          find src test -type f \( -name '*.cpp' -o -name '*.cc' -o -name '*.cxx' \) -print0 \
            | xargs -0 clang-tidy -p build --quiet

  build:
    name: Build C++ project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

  test:
    name: Run C++ tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
